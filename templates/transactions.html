{% extends "base.html" %}
{% block content %}

<h2 class="text-2xl mb-4">Transactions</h2>
<ul id="list"></ul>
<script>
    fetch("/api/transactions/",{
        headers:{
        "Authorization":"Token "+localStorage.getItem("token")
        }
    })
    .then(res=>res.json())
    .then(data=>{
        data.forEach(t=>{
        list.innerHTML += `
        <li class="bg-white p-3 mb-2 rounded shadow">
            ${t.amount} - ${t.type}
        </li>`;
        });
    });
</script>

{% endblock %}
