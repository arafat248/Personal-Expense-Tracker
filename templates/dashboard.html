{% extends "base.html" %}
{% block content %}

<h2 class="text-2xl mb-6">Dashboard</h2>
<div class="grid grid-cols-3 gap-6">
    <div class="bg-white p-6 rounded shadow">
        <p>Total Income</p>
        <h3 id="income" class="text-xl font-bold"></h3>
    </div>
    <div class="bg-white p-6 rounded shadow">
        <p>Total Expense</p>
        <h3 id="expense" class="text-xl font-bold"></h3>
    </div>
    <div class="bg-white p-6 rounded shadow">
        <p>Balance</p>
        <h3 id="balance" class="text-xl font-bold text-green-600"></h3>
    </div>
</div>
<script>
    fetch("/api/dashboard/summary/",{
        headers:{
        "Authorization":"Token "+localStorage.getItem("token")
        }
    })
    .then(res=>res.json())
    .then(data=>{
        income.innerText = data.total_income;
        expense.innerText = data.total_expense;
        balance.innerText = data.balance;
    });
</script>

{% endblock %}
