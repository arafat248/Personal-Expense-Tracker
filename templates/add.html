{% extends "base.html" %}
{% block content %}

<h2 class="text-2xl mb-4">Add Transaction</h2>
<form id="form" class="bg-white p-6 rounded shadow max-w-md">
    <input id="amount" class="border p-2 w-full mb-3" placeholder="Amount">
    <select id="type" class="border p-2 w-full mb-3">
        <option>Expense</option>
        <option>Income</option>
    </select>
    <select id="category" class="border p-2 w-full mb-3"></select>
    <input type="date" id="date" class="border p-2 w-full mb-3">
    <button class="bg-blue-500 text-white px-4 py-2 w-full">Save</button>
</form>
<script>
    const token = localStorage.getItem("token");

    fetch("/api/categories/",{
        headers:{ "Authorization":"Token "+token }
    })
    .then(res=>res.json())
    .then(data=>{
        data.forEach(c=>{
        category.innerHTML += `<option value="${c.id}">${c.name}</option>`;
        });
    });
    document.getElementById("form").onsubmit = async(e)=>{
        e.preventDefault();
        await fetch("/api/transactions/",{
        method:"POST",
        headers:{
            "Content-Type":"application/json",
            "Authorization":"Token "+token
        },
        body: JSON.stringify({
            amount: amount.value,
            type: type.value,
            category: category.value,
            date: date.value
        })
        });
        alert("Saved!");
        window.location="/transactions/";
    }
</script>

{% endblock %}
