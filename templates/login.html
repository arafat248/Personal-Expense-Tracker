{% extends "base.html" %}
{% block content %}

<div class="max-w-md mx-auto bg-white p-6 rounded shadow">
    <h2 class="text-2xl mb-4">Login</h2>
    <form id="loginForm">
        <input class="border p-2 w-full mb-3" placeholder="Username" id="username">
        <input class="border p-2 w-full mb-3" type="password" placeholder="Password" id="password">
        <button class="bg-blue-500 text-white px-4 py-2 w-full">Login</button>
    </form>
</div>
<script>
    document.getElementById("loginForm").onsubmit = async (e)=>{
        e.preventDefault();
        const res = await fetch("/api/auth/login/",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
                username: username.value,
                password: password.value
            })
        });
        const data = await res.json();
        localStorage.setItem("token", data.token);
        alert("Login Success");
        window.location="/dashboard/";
    }
</script>

{% endblock %}
